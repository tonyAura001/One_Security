name: Frontend CI

# Qualité : lint + build du frontend Next.js à chaque push/PR sur main
# (ne tourne pas sur les changements backend apps/api, qui ont leur propre CI).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'apps/api/**'
      - 'supabase/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'apps/api/**'
      - 'supabase/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
