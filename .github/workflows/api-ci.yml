name: API CI

# Monorepo : ne se déclenche que sur les changements du backend (apps/api).
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'

defaults:
  run:
    working-directory: apps/api

jobs:
  # ─────────────── Tests (unitaires + intégration sur Postgres) ───────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pilotepme_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pilotepme_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/pilotepme_test?schema=public
      SUPABASE_JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:e2e

  # ─────────── Build & push de l'image Docker (main uniquement) ───────────
  docker:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push vers GHCR avec GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ghcr.io/tonyaura001/pilotepme-api:latest
            ghcr.io/tonyaura001/pilotepme-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
