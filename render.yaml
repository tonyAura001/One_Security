# Blueprint Render — API PilotePME (NestJS + Prisma, conteneur Docker).
# Le service ne construit QUE apps/api (monorepo ; le front est déployé sur Vercel).
# Les secrets sont en `sync: false` → à saisir dans le dashboard Render, jamais ici.
services:
  - type: web
    name: pilotepme-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: frankfurt
    plan: free
    branch: main
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # ── Base de données (Supabase) ──
      # DATABASE_URL : utiliser le **Session pooler** (port 5432, IPv4) — il
      # supporte à la fois le runtime ET `prisma migrate deploy` (lancé au boot
      # du conteneur). NE PAS mettre le pooler transactionnel 6543 ici.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # ── Supabase ──
      - key: SUPABASE_URL
        value: https://wypoifuwyylvbzuwmuct.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # ── Runtime ──
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://pilotepme-sandy.vercel.app
